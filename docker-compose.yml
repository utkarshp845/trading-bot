x-bot: &bot
  build: .
  env_file:
    - .env
  volumes:
    - ./runtime:/app/runtime

services:
  trade:
    <<: *bot
    command: ["python", "-m", "bot.profile_runner", "live", "trade", "btc"]

  paper:
    <<: *bot
    command: ["python", "-m", "bot.profile_runner", "paper", "trade", "btc"]

  monitor:
    <<: *bot
    command: ["python", "-m", "bot.profile_runner", "live", "monitor", "btc"]

  live-monitor:
    <<: *bot
    command: ["python", "-m", "bot.profile_runner", "live", "monitor", "btc"]

  paper-monitor:
    <<: *bot
    command: ["python", "-m", "bot.profile_runner", "paper", "monitor", "btc"]

  validate:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: ["python", "-m", "bot.validate_runtime"]
