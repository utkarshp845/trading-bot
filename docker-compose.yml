x-btc: &btc
  build: .
  env_file:
    - .env
    - config/live_btc.env
  volumes:
    - ./runtime:/app/runtime

services:
  trade:
    <<: *btc
    command: ["python", "-m", "bot.profile_runner", "live", "trade"]

  paper:
    <<: *btc
    command: ["python", "-m", "bot.profile_runner", "live", "trade"]

  monitor:
    <<: *btc
    command: ["python", "-m", "bot.profile_runner", "live", "monitor"]

  validate:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: ["python", "-m", "bot.validate_runtime"]
