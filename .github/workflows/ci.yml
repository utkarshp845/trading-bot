name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-asyncio

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run runtime validation
        run: python -m bot.validate_runtime

      - name: Run paper profile validation
        run: python -m bot.profile_runner paper validate

      - name: Run live profile validation
        run: python -m bot.profile_runner live validate
