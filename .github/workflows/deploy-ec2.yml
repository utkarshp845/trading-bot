name: Deploy To EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      profile:
        description: Profile to deploy and schedule on EC2
        required: true
        default: live
        type: choice
        options:
          - live
          - paper
      install_cron:
        description: Install or refresh the weekday cron schedule
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ vars.EC2_PORT != '' && vars.EC2_PORT || '22' }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR != '' && vars.EC2_APP_DIR || '/home/ubuntu/trading-bot' }}
      DEPLOY_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'live' }}
      DEPLOY_MARKET: btc
      INSTALL_CRON: ${{ github.event_name == 'workflow_dispatch' && inputs.install_cron || 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate deploy profile locally
        run: |
          python -m bot.validate_runtime
          python -m bot.profile_runner "$DEPLOY_PROFILE" validate "$DEPLOY_MARKET"

      - name: Validate required secrets
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          test -n "${{ secrets.EC2_ENV_FILE }}"

      - name: Prepare SSH
        run: |
          set -euo pipefail

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/deploy_key"
          sed -i 's/\r$//' "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          touch "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          if ! ssh-keyscan -T 30 -p "$EC2_PORT" -H "$EC2_HOST" >> "$HOME/.ssh/known_hosts"; then
            echo "::error::Could not fetch the SSH host key from $EC2_HOST:$EC2_PORT. Verify EC2_HOST, EC2_PORT, the instance state, and security group ingress from GitHub-hosted runners."
            exit 1
          fi

      - name: Write runtime env file
        run: |
          printf '%s\n' "${{ secrets.EC2_ENV_FILE }}" > ec2.env
          chmod 600 ec2.env

      - name: Ensure remote app directory exists
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "mkdir -p '$EC2_APP_DIR'"

      - name: Sync repository to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p $EC2_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude "__pycache__/" \
            --exclude ".pytest_cache/" \
            --exclude ".mypy_cache/" \
            --exclude ".venv/" \
            --exclude ".claude/" \
            --exclude "data/" \
            --exclude "logs/" \
            --exclude "reports/" \
            --exclude "runtime/" \
            ./ "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/"

      - name: Upload runtime env file
        run: |
          scp -i "$HOME/.ssh/deploy_key" -P "$EC2_PORT" ec2.env \
            "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/.env"

      - name: Deploy on EC2
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && chmod +x deploy/ec2/deploy_remote.sh deploy/ec2/install_cron.sh && APP_DIR='$EC2_APP_DIR' DEPLOY_MARKET='$DEPLOY_MARKET' INSTALL_CRON='$INSTALL_CRON' RUN_AFTER_DEPLOY='0' bash deploy/ec2/deploy_remote.sh '$DEPLOY_PROFILE'"

      - name: Verify remote runtime env
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && test -s .env && docker compose run --rm --entrypoint python -e DEPLOY_PROFILE='$DEPLOY_PROFILE' -e DEPLOY_MARKET='$DEPLOY_MARKET' trade -c 'from bot.profile import load_profile; import os; profile = os.environ[\"DEPLOY_PROFILE\"]; market = os.environ[\"DEPLOY_MARKET\"]; load_profile(profile, market); assert os.getenv(\"SYMBOL\") == \"BTC/USD\", os.getenv(\"SYMBOL\"); assert os.getenv(\"IS_CRYPTO\") == \"true\", os.getenv(\"IS_CRYPTO\"); print(\"remote profile ok:\", os.getenv(\"BOT_PROFILE\"), os.getenv(\"BOT_MARKET\"), os.getenv(\"SYMBOL\"))'"

